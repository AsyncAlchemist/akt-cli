version: 2
updates:
  # GitHub Actions used in the CI / release / publish workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"

  # Python dependencies (pyproject.toml + uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns: ["*"]
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "deps"
