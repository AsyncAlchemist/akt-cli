name: Publish (PyPI)

# Builds the distribution and publishes via PyPI Trusted Publishing (OIDC) —
# no API token is stored.
#   * workflow_dispatch  -> TestPyPI  (verification)
#   * published release  -> PyPI      (official)
#
# One-time setup on (Test)PyPI -> Account -> Publishing -> Add a pending publisher:
#     PyPI Project Name : akt-cli
#     Owner             : AsyncAlchemist
#     Repository name   : akt-cli
#     Workflow name     : publish.yml
#     Environment name  : pypi      (on PyPI)   /   testpypi  (on TestPyPI)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - name: Check metadata
        run: uvx twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/akt-cli/
    permissions:
      id-token: write  # Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/akt-cli/
    permissions:
      id-token: write  # Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
