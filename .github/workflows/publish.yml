name: Publish (PyPI)

# Builds the distribution and publishes it to PyPI on a published GitHub
# Release, using PyPI Trusted Publishing (OIDC) — no API token is stored.
#
# One-time PyPI setup (done in the PyPI account UI, not here):
#   PyPI -> Account -> Publishing -> Add a pending publisher
#     PyPI Project Name : akt-cli
#     Owner             : AsyncAlchemist
#     Repository name   : akt-cli
#     Workflow name     : publish.yml
#     Environment name  : pypi

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - name: Check metadata
        run: uvx twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/akt-cli/
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
